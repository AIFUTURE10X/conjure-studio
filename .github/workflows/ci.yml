name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Contract — logo generator
        run: npm run check:logo

      - name: Contract — AI helper UI
        run: npm run check:ai-helper-ui

      - name: Contract — AI helper scenarios
        run: npm run check:ai-helper-scenarios

      - name: Contract — image references UI
        run: npm run check:image-references

      - name: Contract — gemini inspire identity
        run: npm run check:gemini-identity

      - name: Build
        run: npm run build
