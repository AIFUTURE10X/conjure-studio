<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="56%" r="62%">
      <stop offset="0%" stop-color="#3a2c12"/>
      <stop offset="60%" stop-color="#14100a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <linearGradient id="gold" x1="90" y1="150" x2="430" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f7e3ad"/>
      <stop offset="42%" stop-color="#dbb56e"/>
      <stop offset="72%" stop-color="#c99850"/>
      <stop offset="100%" stop-color="#a9793a"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#glow)"/>

  <!-- magic sparkle rising from the spout -->
  <path fill="url(#gold)" d="M120 150
    C124 182 131 189 163 193 C131 197 124 204 120 236
    C116 204 109 197 77 193 C109 189 116 182 120 150 Z"/>
  <circle cx="185" cy="140" r="7" fill="#f7e3ad"/>
  <circle cx="76" cy="250" r="5" fill="#dbb56e"/>

  <g fill="url(#gold)">
    <!-- pedestal foot -->
    <rect x="206" y="404" width="100" height="22" rx="10"/>
    <rect x="236" y="384" width="40" height="24" rx="6"/>
    <!-- body reservoir -->
    <ellipse cx="258" cy="336" rx="140" ry="76"/>
    <!-- spout (tapered, up-left) -->
    <path d="M168 300 L60 250 Q48 246 52 260 L150 372 Z"/>
    <!-- lid neck + dome -->
    <rect x="230" y="258" width="56" height="26" rx="8"/>
    <ellipse cx="258" cy="258" rx="48" ry="26"/>
    <!-- finial knob -->
    <circle cx="258" cy="236" r="12"/>
  </g>

  <!-- handle loop on the right -->
  <path d="M356 292 C424 296 428 372 356 376" fill="none" stroke="url(#gold)" stroke-width="24" stroke-linecap="round"/>
</svg>
