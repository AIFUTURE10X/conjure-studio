<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Clay 3D style example: a modelling-clay character with thumbprint texture">
  <defs>
    <linearGradient id="clay-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3e3d0"/>
      <stop offset="1" stop-color="#d5b99e"/>
    </linearGradient>
    <radialGradient id="clay-body" cx="0.34" cy="0.26" r="0.9">
      <stop offset="0" stop-color="#f0996f"/>
      <stop offset="0.55" stop-color="#d0663c"/>
      <stop offset="1" stop-color="#a34523"/>
    </radialGradient>
    <radialGradient id="clay-limb" cx="0.35" cy="0.25" r="0.95">
      <stop offset="0" stop-color="#e78a60"/>
      <stop offset="0.6" stop-color="#c25c34"/>
      <stop offset="1" stop-color="#93401f"/>
    </radialGradient>
    <radialGradient id="clay-eye" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#e0cdb6"/>
    </radialGradient>
    <filter id="clay-grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
    </filter>
    <filter id="clay-shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#clay-bg)"/>

  <ellipse cx="202" cy="374" rx="112" ry="18" fill="#6b4a34" opacity="0.32" filter="url(#clay-shadow)"/>

  <!-- feet -->
  <g fill="url(#clay-limb)">
    <ellipse cx="158" cy="352" rx="34" ry="22"/>
    <ellipse cx="246" cy="352" rx="34" ry="22"/>
  </g>

  <!-- arms, pinched thin where they meet the body -->
  <g fill="url(#clay-limb)">
    <path d="M132 268c-16 4-30 18-36 38-4 14 14 22 22 9 8-13 18-22 28-25z"/>
    <path d="M272 268c16 4 30 18 36 38 4 14-14 22-22 9-8-13-18-22-28-25z"/>
  </g>

  <!-- torso -->
  <path d="M200 222c38 0 62 20 66 54l6 46c2 20-30 30-72 30s-74-10-72-30l6-46c4-34 28-54 66-54z" fill="url(#clay-body)"/>
  <ellipse cx="166" cy="268" rx="20" ry="28" fill="#ffd3ba" opacity="0.3" transform="rotate(-16 166 268)"/>
  <ellipse cx="244" cy="312" rx="22" ry="15" fill="#8a3617" opacity="0.2" transform="rotate(20 244 312)"/>

  <!-- pinched clay tuft -->
  <path d="M200 74c-4-18 6-32 18-36-2 14 4 22 10 28z" fill="url(#clay-limb)"/>

  <!-- head -->
  <circle cx="200" cy="160" r="92" fill="url(#clay-body)"/>
  <ellipse cx="152" cy="112" rx="30" ry="38" fill="#ffd3ba" opacity="0.34" transform="rotate(-28 152 112)"/>

  <!-- eyes -->
  <g>
    <ellipse cx="170" cy="158" rx="23" ry="27" fill="url(#clay-eye)"/>
    <ellipse cx="232" cy="158" rx="23" ry="27" fill="url(#clay-eye)"/>
    <circle cx="175" cy="163" r="10" fill="#4a2b1c"/>
    <circle cx="237" cy="163" r="10" fill="#4a2b1c"/>
    <circle cx="171" cy="158" r="3.4" fill="#fffaf2"/>
    <circle cx="233" cy="158" r="3.4" fill="#fffaf2"/>
  </g>

  <!-- pressed-in smile and cheek dents -->
  <path d="M172 202c12 14 44 14 56 0" stroke="#8a3617" stroke-opacity="0.5" stroke-width="9" stroke-linecap="round" fill="none"/>
  <ellipse cx="146" cy="196" rx="14" ry="10" fill="#8a3617" opacity="0.16" transform="rotate(-14 146 196)"/>
  <ellipse cx="256" cy="196" rx="14" ry="10" fill="#8a3617" opacity="0.16" transform="rotate(14 256 196)"/>
  <ellipse cx="228" cy="118" rx="16" ry="11" fill="#8a3617" opacity="0.14" transform="rotate(18 228 118)"/>

  <!-- clay grain -->
  <rect width="400" height="400" filter="url(#clay-grain)" opacity="0.12" style="mix-blend-mode:multiply"/>
</svg>
